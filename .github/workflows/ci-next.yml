name: CI (Next)

on:
  push:
    branches:
      - next

concurrency: next_environment

jobs:
  next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        name: Checkout [next]
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '24.11.0'
          cache: 'yarn'

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@v4

      - run: yarn install --immutable

      - run: yarn nx format:check

      - run: yarn nx run-many -t lint

      - run: yarn nx run-many -t test

      - run: yarn nx run-many -t build

      - run: yarn nx run playground:build-storybook:ci

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ETHLETE_SDK }}'
          channelId: live
          projectId: ethlete-sdk
          target: storybook-next

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ETHLETE_SDK }}'
          channelId: live
          projectId: ethlete-sdk
          target: docs-next

  publish:
    needs: next
    uses: ./.github/workflows/publish.yml
    with:
      version_command: 'yarn changeset:prerelease'
      commit_message: 'chore: 🤖 update prereleases'
      title: 'Release prerelease packages'
      slack_title: '*New Next Release*'
    secrets: inherit
