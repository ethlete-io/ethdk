name: CI (Main)

on:
  push:
    branches:
      - main

concurrency: release_environment

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        name: Checkout [main]
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.20.0'
          cache: 'yarn'

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4.4.0

      - run: yarn install --immutable

      - run: yarn nx format:check

      - run: yarn nx run-many -t lint

      - run: yarn nx run-many -t test

      - run: yarn nx run-many -t build

      - run: yarn nx run playground:build-storybook:ci

      - uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0.11.0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ETHLETE_SDK }}'
          channelId: live
          projectId: ethlete-sdk
          target: prod

      - name: Create and publish versions
        id: changesets
        uses: TomTomB/changesets-action@a594719799d193f80c6c50a6fb5b0715f6f7a0eb # v1.7.4
        with:
          version: yarn changeset:release
          commit: 'chore: 🤖 update versions'
          publish: yarn release
          title: Release packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: 0

      - name: Post release notes to slack
        if: steps.changesets.outputs.published == 'true'
        id: slack
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "unfurl_links": false,
              "unfurl_media": false,
              "text": "*New Release*",
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "blocks": ${{ steps.changesets.outputs.publishedReleaseNotes }}
            }
