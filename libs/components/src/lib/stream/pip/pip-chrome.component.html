<et-pip-window>
  <ng-template etPipTitleBar>
    @if (state.showBackButton()) {
      <button etPipBack>⊙</button>
    }
    <span class="et-pip-window__title-bar-spacer"></span>
    @if (state.hasMultiplePips()) {
      <button etPipGridToggle>
        @if (state.multiView()) {
          ▣
        } @else {
          ⊞
        }
      </button>
    }
    <button etPipClose>✕</button>
  </ng-template>

  <div etPipStage>
    @for (c of state.cells(); track c.playerId) {
      <div [etPipCell]="c">
        <et-pip-player />
      </div>
    }
  </div>
</et-pip-window>
