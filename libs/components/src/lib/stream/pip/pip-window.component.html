<et-resize-handles [edges]="RESIZE_EDGES" [disabled]="posState.isCollapsed() || posState.isDragging()" />

@if (posState.isCollapsed()) {
  <div [dragHandle]="dragHandle()" etPipCollapseOverlay></div>
}

<div [dragDisabled]="posState.isResizing()" etPipTitleBar>
  <ng-container [ngTemplateOutlet]="titleBarTemplate().template" />
</div>

<div class="et-pip-window__content">
  <ng-content />
</div>
