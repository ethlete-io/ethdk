<div class="et-notification-content">
  <div class="et-notification-header">
    @if (notification.isLoading()) {
      <et-spinner class="et-notification-spinner" diameter="16" strokeWidth="2" />
    }

    <span class="et-notification-title">{{ notification.title() }}</span>

    <button
      [color]="controlsColor()"
      [attr.aria-label]="dismissLabel()"
      class="et-notification-dismiss-btn"
      et-icon-button
      etNotificationDismiss
      size="xs"
      type="button"
    >
      <i etIcon="et-times"></i>
    </button>
  </div>

  @if (notification.message()) {
    <p class="et-notification-message">{{ notification.message() }}</p>
  }

  @if (notification.progress() !== undefined) {
    <et-progress-bar [value]="notification.progress()!" class="et-notification-progress-bar" />
  }

  @if (notification.action()) {
    <div class="et-notification-footer">
      <button et-text-button etNotificationAction size="xs" type="button">
        {{ notification.action()!.label }}
      </button>
    </div>
  }
</div>
