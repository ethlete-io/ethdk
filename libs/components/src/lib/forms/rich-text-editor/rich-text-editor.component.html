<div class="et-rte-toolbar" role="toolbar" aria-label="Text formatting">
  <button
    [pressed]="dir.boldActive()"
    [disabled]="dir.disabled() || dir.readonly()"
    (mousedown)="$event.preventDefault()"
    (click)="dir.toggleBold()"
    et-icon-button
    [mutedUntilPressed]="true"
    size="xs"
    type="button"
    aria-label="Bold"
  >
    <i etIcon="et-bold"></i>
  </button>

  <button
    [pressed]="dir.italicActive()"
    [disabled]="dir.disabled() || dir.readonly()"
    (mousedown)="$event.preventDefault()"
    (click)="dir.toggleItalic()"
    et-icon-button
    [mutedUntilPressed]="true"
    size="xs"
    type="button"
    aria-label="Italic"
  >
    <i etIcon="et-italic"></i>
  </button>

  <button
    [pressed]="dir.strikeActive()"
    [disabled]="dir.disabled() || dir.readonly()"
    (mousedown)="$event.preventDefault()"
    (click)="dir.toggleStrikethrough()"
    et-icon-button
    [mutedUntilPressed]="true"
    size="xs"
    type="button"
    aria-label="Strikethrough"
  >
    <i etIcon="et-strikethrough"></i>
  </button>

  <span class="et-rte-toolbar-divider" aria-hidden="true"></span>

  <button
    [pressed]="dir.unorderedListActive()"
    [disabled]="dir.disabled() || dir.readonly()"
    (mousedown)="$event.preventDefault()"
    (click)="dir.toggleUnorderedList()"
    et-icon-button
    [mutedUntilPressed]="true"
    size="xs"
    type="button"
    aria-label="Bulleted list"
  >
    <i etIcon="et-list-bulleted"></i>
  </button>

  <button
    [pressed]="dir.orderedListActive()"
    [disabled]="dir.disabled() || dir.readonly()"
    (mousedown)="$event.preventDefault()"
    (click)="dir.toggleOrderedList()"
    et-icon-button
    [mutedUntilPressed]="true"
    size="xs"
    type="button"
    aria-label="Numbered list"
  >
    <i etIcon="et-list-numbered"></i>
  </button>

  <button
    [pressed]="dir.linkActive()"
    [disabled]="dir.disabled() || dir.readonly()"
    (mousedown)="$event.preventDefault()"
    (click)="promptForLink()"
    et-icon-button
    [mutedUntilPressed]="true"
    size="xs"
    type="button"
    aria-label="Link"
  >
    <i etIcon="et-link" [allowHardcodedColor]="true"></i>
  </button>
</div>

<div
  #editable
  [attr.contenteditable]="dir.disabled() || dir.readonly() ? 'false' : 'true'"
  [attr.tabindex]="dir.disabled() ? -1 : 0"
  [attr.data-placeholder]="dir.placeholder() || null"
  [attr.aria-invalid]="dir.shouldDisplayError() || null"
  [attr.aria-describedby]="dir.describedById() || null"
  [attr.aria-labelledby]="dir.labelId() || null"
  [attr.aria-disabled]="dir.disabled() || null"
  [attr.aria-readonly]="dir.readonly() || null"
  (input)="onInput()"
  (beforeinput)="onBeforeInput($event)"
  (keydown)="onKeydown($event)"
  (focus)="dir.focused.set(true)"
  (blur)="dir.focused.set(false); dir.touched.set(true)"
  class="et-rte-content"
  role="textbox"
  aria-multiline="true"
></div>
