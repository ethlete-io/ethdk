<div class="et-checkbox-box">
  <svg
    #checkmark
    [style.color]="frozenCheckmarkColor()"
    class="et-checkbox-checkmark"
    viewBox="0 0 16 16"
    aria-hidden="true"
  >
    <polyline
      class="et-checkbox-checkmark-path"
      points="3.5 8 6.5 11 12.5 5"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </svg>
  <svg
    #indeterminate
    [style.color]="frozenIndeterminateColor()"
    class="et-checkbox-indeterminate"
    viewBox="0 0 16 16"
    aria-hidden="true"
  >
    <line
      class="et-checkbox-indeterminate-path"
      x1="4"
      y1="8"
      x2="12"
      y2="8"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
    />
  </svg>
</div>
