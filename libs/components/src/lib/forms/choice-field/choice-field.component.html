<div class="et-choice-field-control" etColorInteractiveContainer>
  <div class="et-choice-field-control-slot">
    <ng-content />
  </div>

  <div class="et-choice-field-label-area">
    <ng-content select="et-label" />
  </div>
</div>

@if (support.shouldRenderSupport()) {
  <div [style.block-size.px]="support.supportHeight()" class="et-choice-field-support" etColorInteractiveExclude>
    <div class="et-choice-field-support-stack">
      @if (support.shouldRenderError()) {
        <div
          #errorContent
          #errorAnimatable="etAnimatable"
          [id]="support.formFieldDir.errorId()"
          [attr.aria-atomic]="support.errorActive() ? 'true' : null"
          [attr.aria-hidden]="!support.errorActive() ? 'true' : null"
          [attr.aria-live]="support.errorActive() ? 'polite' : null"
          [attr.data-active]="support.errorActive() || null"
          [etProvideColor]="support.errorColorTheme"
          class="et-choice-field-support-content et-choice-field-errors"
          etAnimatable
        >
          @for (error of support.visibleErrors(); track $index) {
            <et-form-error [error]="error" />
          }
        </div>
      }

      @if (support.shouldRenderHint()) {
        <div
          #hintContent
          #hintAnimatable="etAnimatable"
          [id]="support.formFieldDir.hintId()"
          [attr.aria-hidden]="!support.hintActive() ? 'true' : null"
          [attr.data-active]="support.hintActive() || null"
          class="et-choice-field-support-content et-choice-field-hint"
          etAnimatable
        >
          <ng-content select="et-hint" />
        </div>
      }
    </div>
  </div>
}
